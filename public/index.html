<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PulseTrader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap');

  :root {
    --bg:       #020508;
    --surface:  #060d14;
    --card:     #0a1520;
    --border:   #0e2035;
    --border2:  #162840;
    --green:    #00ff88;
    --green2:   #00cc66;
    --red:      #ff3355;
    --red2:     #cc2244;
    --yellow:   #ffcc00;
    --blue:     #00aaff;
    --cyan:     #00e5ff;
    --dim:      #2a4a6a;
    --text:     #c8d8e8;
    --text2:    #5a7a9a;
    --text3:    #3a5a7a;
    --mono:     'Share Tech Mono', monospace;
    --head:     'Rajdhani', sans-serif;
    --body:     'Exo 2', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* ════════════════════════════════════
     LOGIN SCREEN
  ════════════════════════════════════ */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000; gap: 32px;
    padding: 24px;
  }
  #login-screen.hidden { display: none; }

  .login-logo {
    text-align: center;
  }
  .login-logo .bolt {
    font-size: 48px; line-height: 1;
    color: var(--green);
    filter: drop-shadow(0 0 20px var(--green));
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .login-logo h1 {
    font-family: var(--head);
    font-size: 36px; font-weight: 700;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: 0 0 30px rgba(0,255,136,0.5);
    margin-top: 8px;
  }
  .login-logo p {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: 3px;
    color: var(--text2); margin-top: 4px;
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 28px 24px;
    width: 100%; max-width: 340px;
    box-shadow: 0 0 40px rgba(0,255,136,0.05);
  }
  .login-box label {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: 2px;
    color: var(--text2); display: block;
    margin-bottom: 10px;
  }
  .login-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 6px;
    padding: 14px 16px;
    text-align: center;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .login-box input:focus {
    border-color: var(--green);
    box-shadow: 0 0 15px rgba(0,255,136,0.15);
  }
  .login-box input.error {
    border-color: var(--red);
    animation: shake .4s ease;
  }
  .login-btn {
    width: 100%; margin-top: 16px;
    background: var(--green);
    color: var(--bg);
    border: none; border-radius: 8px;
    font-family: var(--head);
    font-size: 16px; font-weight: 700;
    letter-spacing: 3px; padding: 14px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .login-btn:active { transform: scale(.97); opacity: .85; }
  .login-err {
    color: var(--red); font-family: var(--mono);
    font-size: 11px; text-align: center;
    margin-top: 10px; min-height: 16px;
  }

  /* ════════════════════════════════════
     APP SHELL
  ════════════════════════════════════ */
  #app { display: none; flex-direction: column; height: 100vh; }
  #app.visible { display: flex; }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo {
    font-family: var(--head);
    font-size: 20px; font-weight: 700;
    letter-spacing: 2px; color: var(--green);
    text-shadow: 0 0 15px rgba(0,255,136,0.4);
  }
  .topbar-logo span { color: var(--text2); font-weight: 400; }
  .status-badge {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 1px; padding: 3px 8px;
    border-radius: 20px; border: 1px solid;
  }
  .status-badge.running {
    color: var(--green); border-color: var(--green);
    background: rgba(0,255,136,0.07);
    box-shadow: 0 0 8px rgba(0,255,136,0.15);
  }
  .status-badge.stopped { color: var(--red); border-color: var(--red); background: rgba(255,51,85,0.07); }

  .topbar-right { text-align: right; }
  .equity-val {
    font-family: var(--mono);
    font-size: 15px; color: var(--text);
    font-weight: 600;
  }
  .pnl-today { font-family: var(--mono); font-size: 11px; }
  .pnl-today.pos { color: var(--green); }
  .pnl-today.neg { color: var(--red); }

  /* ── MARKET STATUS BAR ── */
  .market-bar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 6px 14px;
    display: flex; align-items: center;
    gap: 12px; overflow-x: auto;
    scrollbar-width: none; flex-shrink: 0;
  }
  .market-bar::-webkit-scrollbar { display: none; }
  .market-chip {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 1px; white-space: nowrap;
    color: var(--text2);
  }
  .market-chip .dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; margin-right: 5px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-glow 1.5s ease-in-out infinite;
  }
  .market-chip .dot.closed { background: var(--dim); box-shadow: none; animation: none; }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1; overflow-y: auto;
    padding: 12px 12px 80px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; flex-shrink: 0;
    position: sticky; bottom: 0;
  }
  .nav-tab {
    flex: 1; display: flex;
    flex-direction: column; align-items: center;
    padding: 10px 4px 8px;
    cursor: pointer; gap: 3px;
    font-family: var(--head);
    font-size: 10px; letter-spacing: .5px;
    color: var(--text3); font-weight: 600;
    border-top: 2px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .nav-tab .icon { font-size: 18px; line-height: 1; }
  .nav-tab.active { color: var(--green); border-top-color: var(--green); }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ════════════════════════════════════
     CARDS & SHARED COMPONENTS
  ════════════════════════════════════ */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .card-title {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 2px; color: var(--text2);
    margin-bottom: 10px; text-transform: uppercase;
  }

  .stat-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 10px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 8px;
    text-align: center;
  }
  .stat-box .lbl {
    font-family: var(--mono); font-size: 9px;
    color: var(--text2); letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-box .val {
    font-family: var(--mono); font-size: 15px;
    font-weight: 600; color: var(--text);
  }
  .stat-box .val.green { color: var(--green); }
  .stat-box .val.red   { color: var(--red); }
  .stat-box .val.yellow { color: var(--yellow); }

  .btn {
    font-family: var(--head); font-weight: 700;
    font-size: 12px; letter-spacing: 1.5px;
    padding: 10px 16px; border-radius: 8px;
    border: 1px solid; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.96); opacity: .8; }
  .btn-green  { background: rgba(0,255,136,0.1); color: var(--green); border-color: var(--green); }
  .btn-red    { background: rgba(255,51,85,0.1);  color: var(--red);   border-color: var(--red); }
  .btn-blue   { background: rgba(0,170,255,0.1);  color: var(--blue);  border-color: var(--blue); }
  .btn-dim    { background: var(--surface); color: var(--text2); border-color: var(--border2); }
  .btn-row    { display: flex; gap: 8px; flex-wrap: wrap; }

  .tag {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 1px; padding: 3px 8px;
    border-radius: 4px;
  }
  .tag-green { background: rgba(0,255,136,0.12); color: var(--green); }
  .tag-red   { background: rgba(255,51,85,0.12);  color: var(--red); }
  .tag-blue  { background: rgba(0,170,255,0.12);  color: var(--blue); }
  .tag-yellow { background: rgba(255,204,0,0.12); color: var(--yellow); }
  .tag-dim   { background: var(--surface); color: var(--text2); }

  /* ════════════════════════════════════
     BOT TAB
  ════════════════════════════════════ */
  .trade-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .trade-row:last-child { border-bottom: none; }
  .trade-sym {
    font-family: var(--head); font-weight: 700;
    font-size: 15px; color: var(--text);
    min-width: 52px;
  }
  .trade-meta {
    flex: 1; font-family: var(--mono);
    font-size: 10px; color: var(--text2);
    line-height: 1.6;
  }
  .trade-price {
    font-family: var(--mono); font-size: 13px;
    text-align: right;
  }

  /* ════════════════════════════════════
     HOLDINGS TAB
  ════════════════════════════════════ */
  .holding-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    margin-bottom: 10px;
  }
  .holding-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  .holding-sym {
    font-family: var(--head); font-weight: 700;
    font-size: 20px; color: var(--text);
  }
  .holding-pnl {
    font-family: var(--mono); font-size: 16px;
    font-weight: 700;
  }
  .holding-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .hg-item { font-family: var(--mono); font-size: 11px; }
  .hg-item .k { color: var(--text2); }
  .hg-item .v { color: var(--text); }
  .progress-bar {
    height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
    margin-top: 10px;
  }
  .progress-fill {
    height: 100%; background: var(--green);
    border-radius: 2px; transition: width .5s ease;
    box-shadow: 0 0 6px var(--green);
  }

  /* Order Flow Mini Panel */
  .of-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px;
    margin-top: 10px;
  }
  .of-title {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 2px; color: var(--text3);
    margin-bottom: 8px;
  }
  .of-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .of-label { font-family: var(--mono); font-size: 10px; color: var(--text2); }
  .of-val   { font-family: var(--mono); font-size: 11px; font-weight: 600; }
  .buy-bar-wrap {
    height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden;
    margin-top: 6px;
  }
  .buy-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width .6s ease;
  }

  /* ════════════════════════════════════
     MOVERS TAB
  ════════════════════════════════════ */
  .movers-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }
  .movers-title {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 2px; color: var(--text2);
  }
  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2); border-radius: 6px;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 1px; padding: 6px 12px;
    cursor: pointer;
  }
  .refresh-btn:active { opacity: .7; }

  .ai-box {
    background: rgba(0,170,255,0.05);
    border: 1px solid rgba(0,170,255,0.2);
    border-radius: 8px; padding: 12px;
    margin-bottom: 12px;
  }
  .ai-box .ai-label {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 2px; color: var(--blue);
    margin-bottom: 6px;
  }
  .ai-box .ai-text {
    font-size: 12px; color: var(--text);
    line-height: 1.6; white-space: pre-wrap;
  }

  .mover-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
    margin-bottom: 8px; cursor: pointer;
    transition: border-color .2s;
  }
  .mover-row:active { border-color: var(--border2); opacity: .85; }
  .mover-top {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 6px;
  }
  .mover-sym {
    font-family: var(--head); font-size: 18px;
    font-weight: 700; color: var(--text);
  }
  .mover-name {
    font-size: 11px; color: var(--text2);
    margin-top: 1px; max-width: 180px;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mover-right { text-align: right; }
  .mover-pct {
    font-family: var(--mono); font-size: 20px;
    font-weight: 700; color: var(--green);
    text-shadow: 0 0 10px rgba(0,255,136,0.3);
  }
  .mover-price {
    font-family: var(--mono); font-size: 12px;
    color: var(--text2); margin-top: 1px;
  }
  .mover-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    align-items: center;
  }
  .mover-catalyst {
    font-size: 11px; color: var(--text2);
    line-height: 1.4; margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  /* Expandable detail */
  .mover-detail {
    display: none; margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border2);
  }
  .mover-detail.open { display: block; }
  .detail-section { margin-bottom: 10px; }
  .detail-title {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 2px; color: var(--text3);
    margin-bottom: 6px;
  }
  .of-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .of-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 8px;
  }
  .of-item .ok  { color: var(--green); }
  .of-item .bad { color: var(--red); }
  .of-item .neu { color: var(--yellow); }

  .news-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .news-item:last-child { border-bottom: none; }
  .news-hl {
    font-size: 12px; color: var(--text);
    line-height: 1.4; margin-bottom: 3px;
  }
  .news-src {
    font-family: var(--mono); font-size: 10px;
    color: var(--text3);
  }

  /* ════════════════════════════════════
     NEWS TAB
  ════════════════════════════════════ */
  .news-filter {
    display: flex; gap: 8px; margin-bottom: 12px;
    overflow-x: auto; scrollbar-width: none;
    padding-bottom: 4px;
  }
  .news-filter::-webkit-scrollbar { display: none; }
  .filter-chip {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 1px; padding: 6px 12px;
    border-radius: 20px; border: 1px solid var(--border2);
    color: var(--text2); background: var(--surface);
    white-space: nowrap; cursor: pointer;
    flex-shrink: 0; transition: .2s;
  }
  .filter-chip.active {
    border-color: var(--green); color: var(--green);
    background: rgba(0,255,136,0.07);
  }
  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    margin-bottom: 8px;
  }
  .news-card-headline {
    font-size: 14px; color: var(--text);
    line-height: 1.5; margin-bottom: 8px;
    font-weight: 500;
  }
  .news-card-footer {
    display: flex; justify-content: space-between;
    align-items: center;
  }
  .news-card-source {
    font-family: var(--mono); font-size: 10px;
    color: var(--text3);
  }
  .news-card-time {
    font-family: var(--mono); font-size: 10px;
    color: var(--text3);
  }

  /* ════════════════════════════════════
     P&L TAB
  ════════════════════════════════════ */
  .pnl-big {
    font-family: var(--mono); font-size: 36px;
    font-weight: 700; text-align: center;
    padding: 20px 0 8px;
    text-shadow: 0 0 20px currentColor;
  }
  .pnl-big.pos { color: var(--green); }
  .pnl-big.neg { color: var(--red); }

  .trade-hist-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .trade-hist-row:last-child { border-bottom: none; }
  .hist-sym {
    font-family: var(--head); font-weight: 700;
    font-size: 15px;
  }
  .hist-setup {
    font-family: var(--mono); font-size: 10px;
    color: var(--text2); margin-top: 2px;
  }
  .hist-pnl {
    font-family: var(--mono); font-size: 14px;
    font-weight: 700; text-align: right;
  }
  .hist-date {
    font-family: var(--mono); font-size: 10px;
    color: var(--text3); margin-top: 2px;
    text-align: right;
  }

  /* ════════════════════════════════════
     LOADING / EMPTY
  ════════════════════════════════════ */
  .loading {
    text-align: center; padding: 40px 20px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text2); letter-spacing: 2px;
  }
  .loading::after {
    content: ''; display: block; width: 32px;
    height: 2px; background: var(--green);
    margin: 12px auto 0;
    animation: scan-line 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }
  .empty {
    text-align: center; padding: 40px 20px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text3); letter-spacing: 1px;
  }

  /* ════════════════════════════════════
     ANIMATIONS
  ════════════════════════════════════ */
  @keyframes pulse-glow {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }
  @keyframes scan-line {
    0%   { transform: scaleX(0); opacity: 0; }
    50%  { transform: scaleX(1); opacity: 1; }
    100% { transform: scaleX(0); opacity: 0; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fade-in .3s ease forwards; }

  /* ════════════════════════════════════
     MISC
  ════════════════════════════════════ */
  .divider {
    height: 1px; background: var(--border);
    margin: 10px 0;
  }
  .flex-between {
    display: flex; justify-content: space-between;
    align-items: center;
  }
  .lessons-list { list-style: none; }
  .lessons-list li {
    font-family: var(--mono); font-size: 11px;
    color: var(--text2); padding: 6px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }
  .lessons-list li:last-child { border-bottom: none; }
  .lessons-list li::before { content: '▸ '; color: var(--green); }

  a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-logo">
    <div class="bolt">⚡</div>
    <h1>PULSETRADER</h1>
    <p>PAPER TRADING · KEV'S STRATEGY · ORDER FLOW</p>
  </div>
  <div class="login-box">
    <label>ENTER PASSCODE</label>
    <input type="password" id="passcode-input" maxlength="20" placeholder="••••••••" autocomplete="off">
    <button class="login-btn" id="login-btn">AUTHENTICATE</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MAIN APP
══════════════════════════════════════ -->
<div id="app">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">⚡ PULSE<span>TRADER</span></div>
      <div class="status-badge" id="status-badge">LOADING</div>
    </div>
    <div class="topbar-right">
      <div class="equity-val" id="equity-display">—</div>
      <div class="pnl-today" id="pnl-display">—</div>
    </div>
  </div>

  <!-- Market Bar -->
  <div class="market-bar">
    <span class="market-chip"><span class="dot" id="market-dot"></span><span id="market-status-text">LOADING</span></span>
    <span class="market-chip" id="scan-time-chip">LAST SCAN: —</span>
    <span class="market-chip" id="spy-chip">SPY —</span>
    <span class="market-chip" id="brain-chip">BRAIN: 0 TRADES</span>
  </div>

  <!-- Scroll Area -->
  <div class="scroll-area" id="scroll-area">
    <!-- Bot Tab -->
    <div class="tab-panel active" id="tab-bot">
      <div id="bot-content"><div class="loading">LOADING BOT STATUS</div></div>
    </div>
    <!-- Holdings Tab -->
    <div class="tab-panel" id="tab-holdings">
      <div id="holdings-content"><div class="loading">LOADING HOLDINGS</div></div>
    </div>
    <!-- P&L Tab -->
    <div class="tab-panel" id="tab-pnl">
      <div id="pnl-content"><div class="loading">LOADING P&L</div></div>
    </div>
    <!-- Movers Tab -->
    <div class="tab-panel" id="tab-movers">
      <div class="movers-header">
        <span class="movers-title">🔥 SPIKE SCANNER</span>
        <button class="refresh-btn" id="movers-refresh-btn">↺ REFRESH</button>
      </div>
      <div id="movers-content"><div class="loading">SCANNING MARKET</div></div>
    </div>
    <!-- News Tab -->
    <div class="tab-panel" id="tab-news">
      <div class="news-filter" id="news-filter">
        <div class="filter-chip active" data-ticker="">📰 MARKET</div>
      </div>
      <div id="news-content"><div class="loading">FETCHING NEWS</div></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-tab active" data-tab="bot">
      <span class="icon">🤖</span>Bot
    </div>
    <div class="nav-tab" data-tab="holdings">
      <span class="icon">📊</span>Holdings
    </div>
    <div class="nav-tab" data-tab="pnl">
      <span class="icon">💰</span>P&amp;L
    </div>
    <div class="nav-tab" data-tab="movers">
      <span class="icon">🔥</span>Movers
    </div>
    <div class="nav-tab" data-tab="news">
      <span class="icon">📰</span>News
    </div>
  </nav>
</div>

<script>
// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
let AUTH_TOKEN = sessionStorage.getItem('pt_token') || '';

const api = async (path, opts = {}) => {
  const res = await fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'x-auth-token': AUTH_TOKEN,
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  return res.json();
};

const logout = () => {
  sessionStorage.removeItem('pt_token');
  AUTH_TOKEN = '';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
};

// ── Login flow ──
const loginScreen = document.getElementById('login-screen');
const appEl       = document.getElementById('app');
const passInput   = document.getElementById('passcode-input');
const loginBtn    = document.getElementById('login-btn');
const loginErr    = document.getElementById('login-err');

const doLogin = async () => {
  const passcode = passInput.value.trim();
  if (!passcode) return;
  loginBtn.textContent = 'AUTHENTICATING...';
  loginBtn.disabled = true;
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passcode }),
    });
    const data = await res.json();
    if (!res.ok || !data.token) {
      loginErr.textContent = data.error || 'WRONG PASSCODE';
      passInput.classList.add('error');
      setTimeout(() => passInput.classList.remove('error'), 500);
      loginBtn.textContent = 'AUTHENTICATE';
      loginBtn.disabled = false;
      passInput.value = '';
      return;
    }
    AUTH_TOKEN = data.token;
    sessionStorage.setItem('pt_token', AUTH_TOKEN);
    loginScreen.classList.add('hidden');
    appEl.classList.add('visible');
    initApp();
  } catch (e) {
    loginErr.textContent = 'CONNECTION ERROR';
    loginBtn.textContent = 'AUTHENTICATE';
    loginBtn.disabled = false;
  }
};

loginBtn.addEventListener('click', doLogin);
passInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Check existing token on load
const checkToken = async () => {
  if (!AUTH_TOKEN) return;
  try {
    const r = await fetch('/api/autotrader/status', { headers: { 'x-auth-token': AUTH_TOKEN } });
    if (r.status === 401) { AUTH_TOKEN = ''; sessionStorage.removeItem('pt_token'); return; }
    loginScreen.classList.add('hidden');
    appEl.classList.add('visible');
    initApp();
  } catch (_) {}
};
checkToken();

// ══════════════════════════════════════
// NAV TABS
// ══════════════════════════════════════
let activeTab = 'bot';
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const t = tab.dataset.tab;
    document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + t).classList.add('active');
    document.getElementById('scroll-area').scrollTop = 0;
    activeTab = t;
    if (t === 'movers' && !moversLoaded) loadMovers();
    if (t === 'news'   && !newsLoaded)   loadNews('');
    if (t === 'holdings') loadHoldings();
    if (t === 'pnl')      loadPnL();
  });
});

// ══════════════════════════════════════
// STATUS POLLING
// ══════════════════════════════════════
let statusData   = null;
let moversLoaded = false;
let newsLoaded   = false;

const loadStatus = async () => {
  try {
    const d = await api('/api/autotrader/status');
    statusData = d;

    // Top bar
    const eq = parseFloat(d.equity);
    document.getElementById('equity-display').textContent = eq ? '$' + eq.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
    const pnl = parseFloat(d.today_pnl);
    const pnlEl = document.getElementById('pnl-display');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2) + ' TODAY';
    pnlEl.className = 'pnl-today ' + (pnl >= 0 ? 'pos' : 'neg');

    // Status badge
    const badge = document.getElementById('status-badge');
    badge.textContent = d.active ? '● RUNNING' : '○ PAUSED';
    badge.className = 'status-badge ' + (d.active ? 'running' : 'stopped');

    // Market bar
    const dot = document.getElementById('market-dot');
    dot.className = 'dot' + (d.market_status === 'OPEN' ? '' : ' closed');
    document.getElementById('market-status-text').textContent = d.market_status;
    if (d.last_scan) {
      const t = new Date(d.last_scan);
      document.getElementById('scan-time-chip').textContent = 'SCAN: ' + t.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    // Brain chip
    const b = d.brain;
    document.getElementById('brain-chip').textContent = `BRAIN: ${b.total_trades} | ${b.win_rate} WR`;

    // Render bot tab if active
    if (activeTab === 'bot') renderBot(d);

    // Movers news chip refresh
    updateNewsFilterChips(d.last_gainers || []);

  } catch (_) {}
};

// ══════════════════════════════════════
// BOT TAB
// ══════════════════════════════════════
const renderBot = (d) => {
  const b = d.brain;
  const trades = d.recent_trades || [];

  let html = `
  <div class="card">
    <div class="card-title">PORTFOLIO</div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="lbl">EQUITY</div>
        <div class="val">$${parseFloat(d.equity).toLocaleString('en-US',{minimumFractionDigits:0})}</div>
      </div>
      <div class="stat-box">
        <div class="lbl">TODAY P&L</div>
        <div class="val ${parseFloat(d.today_pnl)>=0?'green':'red'}">${parseFloat(d.today_pnl)>=0?'+':''}$${Math.abs(parseFloat(d.today_pnl)).toFixed(2)}</div>
      </div>
      <div class="stat-box">
        <div class="lbl">POSITIONS</div>
        <div class="val">${d.open_positions}</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-green" id="btn-start">▶ START</button>
      <button class="btn btn-red"   id="btn-stop">■ STOP</button>
      <button class="btn btn-blue"  id="btn-scan">⟳ SCAN</button>
      <button class="btn btn-red"   id="btn-sellall">✕ SELL ALL</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">BRAIN · SELF-LEARNING</div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="lbl">WIN RATE</div>
        <div class="val ${b.win_rate !== '0%' ? 'green' : 'yellow'}">${b.win_rate}</div>
      </div>
      <div class="stat-box">
        <div class="lbl">TRADES</div>
        <div class="val">${b.total_trades}</div>
      </div>
      <div class="stat-box">
        <div class="lbl">TOTAL P&L</div>
        <div class="val ${parseFloat(b.total_pnl)>=0?'green':'red'}">${parseFloat(b.total_pnl)>=0?'+':''}$${Math.abs(parseFloat(b.total_pnl)).toFixed(0)}</div>
      </div>
    </div>
    ${b.lessons?.length ? `
    <div class="card-title" style="margin-top:8px">LESSONS LEARNED</div>
    <ul class="lessons-list">${b.lessons.slice(0,4).map(l => `<li>${escH(l.slice(0,120))}</li>`).join('')}</ul>
    ` : ''}
  </div>

  ${trades.length ? `
  <div class="card">
    <div class="card-title">RECENT ACTIVITY</div>
    ${trades.slice(0,12).map(t => `
    <div class="trade-row">
      <div>
        <div class="trade-sym">${escH(t.symbol||'?')}</div>
        <div class="trade-meta">${escH(t.setup||'')} · ${escH(t.reason?.slice(0,40)||'')}</div>
      </div>
      <div style="text-align:right">
        <div class="tag ${t.type==='BUY'?'tag-green':t.type==='STOP'?'tag-red':'tag-dim'}">${t.type||''}</div>
        <div class="trade-price" style="margin-top:4px; color:var(--text2)">$${parseFloat(t.price||0).toFixed(3)}</div>
      </div>
    </div>`).join('')}
  </div>` : ''}`;

  const el = document.getElementById('bot-content');
  el.innerHTML = html;
  el.classList.add('fade-in');

  // Button events
  document.getElementById('btn-start')?.addEventListener('click', async () => {
    await api('/api/autotrader/start', { method: 'POST' });
    showToast('Auto-trader started ▶');
    setTimeout(loadStatus, 1000);
  });
  document.getElementById('btn-stop')?.addEventListener('click', async () => {
    await api('/api/autotrader/stop', { method: 'POST' });
    showToast('Auto-trader stopped ■');
    setTimeout(loadStatus, 1000);
  });
  document.getElementById('btn-scan')?.addEventListener('click', async () => {
    showToast('Scanning...');
    await api('/api/autotrader/scan', { method: 'POST' });
    setTimeout(loadStatus, 3000);
  });
  document.getElementById('btn-sellall')?.addEventListener('click', async () => {
    if (!confirm('Sell ALL positions?')) return;
    const r = await api('/api/autotrader/sellall', { method: 'POST' });
    showToast(r.message || 'Sold all');
    setTimeout(loadStatus, 2000);
  });
};

// ══════════════════════════════════════
// HOLDINGS TAB
// ══════════════════════════════════════
const loadHoldings = async () => {
  document.getElementById('holdings-content').innerHTML = '<div class="loading">LOADING HOLDINGS</div>';
  try {
    const d = await api('/api/holdings');
    const holdings = d.holdings || [];

    if (!holdings.length) {
      document.getElementById('holdings-content').innerHTML = '<div class="empty">NO OPEN POSITIONS</div>';
      return;
    }

    let html = `
    <div class="card">
      <div class="stat-row">
        <div class="stat-box">
          <div class="lbl">PORT VALUE</div>
          <div class="val">$${parseFloat(d.total_value).toFixed(2)}</div>
        </div>
        <div class="stat-box">
          <div class="lbl">UNREALIZED</div>
          <div class="val ${parseFloat(d.total_pnl)>=0?'green':'red'}">${parseFloat(d.total_pnl)>=0?'+':''}$${parseFloat(d.total_pnl).toFixed(2)}</div>
        </div>
        <div class="stat-box">
          <div class="lbl">TODAY</div>
          <div class="val ${parseFloat(d.total_pnl_today)>=0?'green':'red'}">${parseFloat(d.total_pnl_today)>=0?'+':''}$${parseFloat(d.total_pnl_today).toFixed(2)}</div>
        </div>
      </div>
    </div>`;

    for (const h of holdings) {
      const pnlPct  = parseFloat(h.unrealized_pnl_pct);
      const pnlPos  = pnlPct >= 0;
      const pnlNum  = parseFloat(h.unrealized_pnl);
      const target  = parseFloat(h.first_target);
      const stop    = parseFloat(h.hard_stop);
      const cur     = parseFloat(h.current_price);
      const entry   = parseFloat(h.avg_entry);
      const toTarget = ((target - cur) / cur * 100).toFixed(1);
      const toStop   = ((cur - stop)  / cur * 100).toFixed(1);
      const progress = Math.min(100, Math.max(0, ((cur - entry) / (target - entry)) * 100));

      html += `
      <div class="holding-card">
        <div class="holding-header">
          <div>
            <div class="holding-sym">${escH(h.symbol)}</div>
            <div style="margin-top:4px; display:flex; gap:6px">
              <span class="tag tag-green">LONG ${h.qty}</span>
              <span class="tag tag-dim">${escH(h.setup)}</span>
              ${h.half_sold ? '<span class="tag tag-yellow">½ SOLD</span>' : ''}
            </div>
          </div>
          <div>
            <div class="holding-pnl ${pnlPos?'':'red'}" style="color:${pnlPos?'var(--green)':'var(--red)'}">${pnlPos?'+':''}$${pnlNum.toFixed(2)}</div>
            <div style="text-align:right; margin-top:3px; font-family:var(--mono); font-size:12px; color:${pnlPos?'var(--green)':'var(--red)'}">
              ${pnlPos?'+':''}${pnlPct.toFixed(2)}%
            </div>
          </div>
        </div>
        <div class="holding-grid">
          <div class="hg-item"><span class="k">ENTRY </span><span class="v">$${h.avg_entry}</span></div>
          <div class="hg-item"><span class="k">PRICE </span><span class="v">$${h.current_price}</span></div>
          <div class="hg-item"><span class="k">TARGET </span><span class="v" style="color:var(--green)">$${h.first_target} <small>(+${toTarget}%)</small></span></div>
          <div class="hg-item"><span class="k">STOP  </span><span class="v" style="color:var(--red)">$${h.hard_stop} <small>(-${toStop}%)</small></span></div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${progress}%"></div>
        </div>
        <div id="of-${h.symbol}" class="of-panel">
          <div class="of-title">ORDER FLOW · LOADING...</div>
        </div>
      </div>`;
    }

    document.getElementById('holdings-content').innerHTML = html;

    // Load order flow for each holding
    for (const h of holdings) {
      loadOrderFlowMini(h.symbol);
    }

  } catch (e) {
    document.getElementById('holdings-content').innerHTML = `<div class="empty">Error: ${escH(e.message)}</div>`;
  }
};

const loadOrderFlowMini = async (symbol) => {
  try {
    const d = await api(`/api/orderflow/${symbol}`);
    const of = d.orderFlow;
    if (!of) return;
    const fp = of.footprint, lm = of.liqMap, vp = of.volProfile;
    const buyPct  = fp ? parseFloat(fp.buyPct) : 50;
    const barColor = buyPct >= 60 ? 'var(--green)' : buyPct >= 50 ? 'var(--yellow)' : 'var(--red)';

    const html = `
    <div class="of-title">ORDER FLOW · ${escH(of.entryGrade || '—')}</div>
    ${fp ? `
    <div class="of-row">
      <span class="of-label">FOOTPRINT</span>
      <span class="of-val" style="color:${buyPct>=52?'var(--green)':buyPct>=48?'var(--yellow)':'var(--red)'}">${fp.buyPct}% BUY · ${fp.imbalance}</span>
    </div>
    <div class="buy-bar-wrap">
      <div class="buy-bar-fill" style="width:${buyPct}%;background:${barColor}"></div>
    </div>` : ''}
    ${lm ? `
    <div class="of-row" style="margin-top:8px">
      <span class="of-label">LIQ MAP</span>
      <span class="of-val" style="font-size:10px">${escH(lm.signal.replace(/[🟢🔴⚪🟡]/g,'').trim())}</span>
    </div>` : ''}
    ${vp ? `
    <div class="of-row">
      <span class="of-label">VPOC</span>
      <span class="of-val" style="color:var(--cyan)">$${vp.vpoc} · ${escH(vp.signal.replace(/[🟢🔴⚪⚠️]/g,'').trim())}</span>
    </div>` : ''}`;

    const el = document.getElementById(`of-${symbol}`);
    if (el) el.innerHTML = html;
  } catch (_) {}
};

// ══════════════════════════════════════
// MOVERS TAB
// ══════════════════════════════════════
const loadMovers = async () => {
  moversLoaded = true;
  document.getElementById('movers-content').innerHTML = '<div class="loading">SCANNING MARKET</div>';
  try {
    const d = await api('/api/movers');
    renderMovers(d);
  } catch (e) {
    document.getElementById('movers-content').innerHTML = `<div class="empty">Error: ${escH(e.message)}</div>`;
  }
};

document.getElementById('movers-refresh-btn').addEventListener('click', () => {
  moversLoaded = false;
  loadMovers();
});

const renderMovers = (d) => {
  const gainers  = d.gainers  || [];
  const analysis = d.analysis || '';

  let html = '';

  if (d.scanned) {
    html += `<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:8px;letter-spacing:1px">SCANNED ${d.scanned} STOCKS · ${new Date(d.ts).toLocaleTimeString()}</div>`;
  }

  if (analysis && analysis !== 'No real gainers right now. Check back at market open.') {
    html += `<div class="ai-box fade-in">
      <div class="ai-label">🤖 AI ANALYSIS · KEV'S STRATEGY</div>
      <div class="ai-text">${escH(analysis)}</div>
    </div>`;
  }

  if (!gainers.length) {
    html += `<div class="empty">📭 No real gainers right now.<br>Check back at market open.</div>`;
  } else {
    gainers.forEach((g, i) => {
      const pct = parseFloat(g.change_pct);
      html += `
      <div class="mover-row fade-in" style="animation-delay:${i*40}ms" onclick="toggleMoverDetail(this, '${escH(g.symbol)}')">
        <div class="mover-top">
          <div>
            <div class="mover-sym">${escH(g.symbol)}</div>
            <div class="mover-name">${escH(g.name || g.symbol)}</div>
          </div>
          <div class="mover-right">
            <div class="mover-pct">+${pct.toFixed(2)}%</div>
            <div class="mover-price">$${g.price}</div>
          </div>
        </div>
        <div class="mover-meta">
          <span class="tag tag-dim">Vol ${escH(g.volume_fmt || '—')}</span>
          ${g.float ? `<span class="tag tag-dim">Float ${g.float}M</span>` : ''}
          ${g.industry ? `<span class="tag tag-blue" style="font-size:9px">${escH(g.industry.slice(0,20))}</span>` : ''}
        </div>
        ${g.catalyst ? `<div class="mover-catalyst">📌 ${escH(g.catalyst.slice(0,120))}</div>` : ''}
        <div class="mover-detail" id="detail-${escH(g.symbol)}">
          <div class="loading" style="padding:16px 0">LOADING ORDER FLOW</div>
        </div>
      </div>`;
    });
  }

  const el = document.getElementById('movers-content');
  el.innerHTML = html;
};

window.toggleMoverDetail = async (row, symbol) => {
  const detail = document.getElementById('detail-' + symbol);
  if (!detail) return;
  if (detail.classList.contains('open')) {
    detail.classList.remove('open'); return;
  }
  detail.classList.add('open');
  detail.innerHTML = '<div class="loading" style="padding:12px 0">LOADING ORDER FLOW</div>';

  try {
    const [ofData, newsData] = await Promise.all([
      api(`/api/orderflow/${symbol}`).catch(() => null),
      api(`/api/news?ticker=${symbol}`).catch(() => []),
    ]);

    const of = ofData?.orderFlow;
    const fp = of?.footprint, lm = of?.liqMap, vp = of?.volProfile;
    const news = Array.isArray(newsData) ? newsData.slice(0, 5) : [];

    let html = '';

    // Order Flow
    if (of) {
      html += `<div class="detail-section">
        <div class="detail-title">ORDER FLOW · ${escH(of.entryGrade || '—')}</div>
        <div class="of-grid">`;

      if (fp) {
        const bp = parseFloat(fp.buyPct);
        html += `<div class="of-item">
          <div class="of-label" style="margin-bottom:4px">FOOTPRINT</div>
          <div class="of-val ${bp>=52?'ok':bp>=45?'neu':'bad'}">${fp.buyPct}% BUY</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px">${fp.imbalance}</div>
          <div class="buy-bar-wrap" style="margin-top:6px">
            <div class="buy-bar-fill" style="width:${bp}%;background:${bp>=52?'var(--green)':bp>=45?'var(--yellow)':'var(--red)'}"></div>
          </div>
        </div>`;
      }

      if (lm) {
        html += `<div class="of-item">
          <div class="of-label" style="margin-bottom:4px">LIQUIDITY</div>
          <div class="of-val ${lm.liqRatio>1.1?'ok':lm.liqRatio<0.8?'bad':'neu'}">${lm.liqRatio}x bids</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px">${escH(lm.signal.replace(/[🟢🔴⚪🟡]/g,'').trim().slice(0,30))}</div>
        </div>`;
      }

      if (vp) {
        html += `<div class="of-item">
          <div class="of-label" style="margin-bottom:4px">VOL PROFILE</div>
          <div class="of-val ${vp.aboveVPOC?'ok':'bad'}">VPOC $${vp.vpoc}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px">
            VAH $${vp.vah} · VAL $${vp.val}
          </div>
        </div>`;
      }

      const score = of.entryScore || 0;
      html += `<div class="of-item">
        <div class="of-label" style="margin-bottom:4px">ENTRY SCORE</div>
        <div class="of-val ${score>=2?'ok':score>=1?'neu':'bad'}">${score}/3</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px">
          ${score===3?'✅ ALL GREEN':score===2?'⚡ 2/3 OK':score===1?'⚠ WEAK':'❌ AVOID'}
        </div>
      </div>`;

      html += `</div></div>`;
    }

    // News
    if (news.length) {
      html += `<div class="detail-section">
        <div class="detail-title">LATEST NEWS</div>
        ${news.map(n => `
        <div class="news-item">
          <div class="news-hl">${escH(n.headline)}</div>
          <div class="news-src">${escH(n.source || '—')} · ${n.datetime ? new Date(n.datetime*1000).toLocaleDateString() : ''}</div>
        </div>`).join('')}
      </div>`;
    } else {
      html += `<div style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:8px 0">No recent news</div>`;
    }

    detail.innerHTML = html;
  } catch (e) {
    detail.innerHTML = `<div class="empty">Error loading data</div>`;
  }
};

// ══════════════════════════════════════
// NEWS TAB
// ══════════════════════════════════════
let currentNewsTicker = '';

const loadNews = async (ticker) => {
  newsLoaded = true;
  currentNewsTicker = ticker;
  document.getElementById('news-content').innerHTML = '<div class="loading">FETCHING NEWS</div>';
  try {
    const url = ticker ? `/api/news?ticker=${ticker}` : '/api/news';
    const news = await api(url);
    renderNews(Array.isArray(news) ? news : []);
  } catch (e) {
    document.getElementById('news-content').innerHTML = `<div class="empty">Error: ${escH(e.message)}</div>`;
  }
};

const renderNews = (news) => {
  if (!news.length) {
    document.getElementById('news-content').innerHTML = '<div class="empty">NO NEWS FOUND</div>';
    return;
  }
  const html = news.map((n, i) => `
  <div class="news-card fade-in" style="animation-delay:${i*30}ms">
    <div class="news-card-headline">${escH(n.headline)}</div>
    <div class="news-card-footer">
      <span class="news-card-source">${escH(n.source || '—')}</span>
      <span class="news-card-time">${n.datetime ? timeSince(n.datetime * 1000) : ''}</span>
    </div>
  </div>`).join('');
  document.getElementById('news-content').innerHTML = html;
};

const updateNewsFilterChips = (gainers) => {
  const filter = document.getElementById('news-filter');
  const existing = new Set(Array.from(filter.querySelectorAll('.filter-chip')).map(c => c.dataset.ticker));
  const top5 = gainers.slice(0, 5);
  top5.forEach(g => {
    const sym = g.ticker || g.symbol;
    if (!sym || existing.has(sym)) return;
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.dataset.ticker = sym;
    chip.textContent = sym;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      loadNews(sym);
    });
    filter.appendChild(chip);
    existing.add(sym);
  });
};

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    loadNews(chip.dataset.ticker || '');
  });
});

// ══════════════════════════════════════
// P&L TAB
// ══════════════════════════════════════
const loadPnL = async () => {
  document.getElementById('pnl-content').innerHTML = '<div class="loading">LOADING P&L</div>';
  try {
    const d = await api('/api/pnl');
    const s = d.summary;
    const trades = d.recent || [];
    const pnl = parseFloat(s.total_pnl);

    const html = `
    <div class="card">
      <div class="pnl-big ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}$${Math.abs(pnl).toFixed(2)}</div>
      <div style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:14px">TOTAL P&L</div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="lbl">WIN RATE</div>
          <div class="val ${parseFloat(s.win_rate)>=50?'green':'red'}">${s.win_rate}</div>
        </div>
        <div class="stat-box">
          <div class="lbl">TRADES</div>
          <div class="val">${s.total_trades}</div>
        </div>
        <div class="stat-box">
          <div class="lbl">AVG P&L</div>
          <div class="val ${parseFloat(s.avg_pnl)>=0?'green':'red'}">${parseFloat(s.avg_pnl)>=0?'+':''}$${parseFloat(s.avg_pnl).toFixed(2)}</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="lbl">WINS</div><div class="val green">${s.winners}</div></div>
        <div class="stat-box"><div class="lbl">LOSSES</div><div class="val red">${s.losers}</div></div>
        <div class="stat-box"><div class="lbl">OPEN</div><div class="val">${s.open}</div></div>
      </div>
      ${s.best_trade ? `<div style="font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:4px">BEST: <span style="color:var(--green)">${s.best_trade.symbol} +$${parseFloat(s.best_trade.pnl).toFixed(2)}</span></div>` : ''}
    </div>

    ${trades.filter(t=>t.pnl!=null).length ? `
    <div class="card">
      <div class="card-title">TRADE HISTORY</div>
      ${trades.filter(t=>t.pnl!=null).slice(0,20).map(t => {
        const p = parseFloat(t.pnl), pp = parseFloat(t.pnl_pct);
        return `<div class="trade-hist-row">
          <div>
            <div class="hist-sym ${p>=0?'':'red'}" style="color:${p>=0?'var(--text)':'var(--red)'}">${escH(t.symbol)}</div>
            <div class="hist-setup">${escH((t.reason||'').slice(0,40))}</div>
          </div>
          <div>
            <div class="hist-pnl" style="color:${p>=0?'var(--green)':'var(--red)'}">${p>=0?'+':''}$${Math.abs(p).toFixed(2)}</div>
            <div class="hist-date">${pp>=0?'+':''}${pp.toFixed(1)}%</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}`;

    document.getElementById('pnl-content').innerHTML = html;
  } catch (e) {
    document.getElementById('pnl-content').innerHTML = `<div class="empty">Error: ${escH(e.message)}</div>`;
  }
};

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
const escH = (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const timeSince = (ts) => {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)  return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
};

let toastTimer;
const showToast = (msg) => {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    Object.assign(t.style, {
      position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)',
      background:'var(--card)', border:'1px solid var(--green)',
      color:'var(--green)', fontFamily:'var(--mono)', fontSize:'11px',
      letterSpacing:'1px', padding:'10px 18px', borderRadius:'8px',
      zIndex:'9998', boxShadow:'0 0 20px rgba(0,255,136,0.2)',
      transition:'opacity .3s',
    });
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
};
